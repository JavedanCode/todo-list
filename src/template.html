<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div id="content">
      <div id="sidebar">
        <div id="top-sidebar">
          <button class="section-btn">🧾 All</button>
          <button class="section-btn">🗓️ Today</button>
          <button class="section-btn">✔️ Completed</button>
        </div>
        <div id="mid-sidebar">
          <button class="section-btn">📁 Project List</button>
          <button class="section-btn">➕ Add Project</button>
        </div>
      </div>
      <div class="header">
        <img class="logo" src="./img/logo.png" alt="phoenix logo" />
        <p class="title">Todo Phoenix</p>
      </div>
      <div id="main">
        <button id="add-task-btn">➕</button>
        <div id="projects">
          <h2 id="project-title">All Tasks</h2>
          <div id="tasks">
            <div class="task-item high">
              <div class="task-left">
                <input type="checkbox" />
                <span class="task-title">Sample Task</span>
              </div>

              <div class="task-actions">
                <button class="edit-btn">✏</button>
                <button class="delete-btn">🗑</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="modal-overlay" class="hidden">
        <div id="modal">
          <div class="modal-content">
            <h2>Add Task</h2>
            <input placeholder="Task title" />
            <textarea placeholder="Description"></textarea>
            <input type="date" />

            <select>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <button>Add</button>
          </div>
        </div>
      </div>
      <footer id="footer">
        <p>
          Copyright © 2026
          <a href="https://github.com/JavedanCode">
            JavedanCode
            <img class="github-logo" src="./img/github-mark.svg" />
          </a>
        </p>
      </footer>
    </div>
  </body>
</html>
